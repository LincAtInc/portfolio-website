<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGradient)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.02">
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <rect width="1920" height="1080" fill="url(#grid)" />
  </g>

  <!-- Ambient glows - repositioned for better mobile coverage -->
  <circle cx="960" cy="300" r="400" fill="#FF00FF" opacity="0.08" filter="url(#strongGlow)" class="mobile-subtle"/>
  <circle cx="300" cy="200" r="250" fill="#FF00FF" opacity="0.18" filter="url(#strongGlow)" class="desktop-only"/>
  <circle cx="1620" cy="880" r="300" fill="#FF00FF" opacity="0.15" filter="url(#strongGlow)" class="desktop-only"/>
  <circle cx="960" cy="700" r="300" fill="#00FFFF" opacity="0.06" filter="url(#strongGlow)" class="mobile-subtle"/>

  <!-- Main Robot/AI Agent - Center (visible on mobile) -->
  <g opacity="0.35" transform="translate(960, 450)" class="mobile-subtle">
    <!-- Robot head -->
    <rect x="-40" y="-50" width="80" height="70" rx="10" fill="none" stroke="#FF00FF" stroke-width="3" filter="url(#glow)"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-25" r="8" fill="#FF00FF" opacity="0.8" filter="url(#glow)"/>
    <circle cx="18" cy="-25" r="8" fill="#FF00FF" opacity="0.8" filter="url(#glow)"/>
    <!-- Antenna -->
    <line x1="0" y1="-50" x2="0" y2="-75" stroke="#FF00FF" stroke-width="2.5"/>
    <circle cx="0" cy="-75" r="5" fill="#FF00FF" filter="url(#glow)"/>
    <!-- Mouth/display -->
    <rect x="-25" y="0" width="50" height="8" rx="2" fill="#FF00FF" opacity="0.5"/>
    <!-- Body -->
    <rect x="-50" y="25" width="100" height="90" rx="8" fill="none" stroke="#FF00FF" stroke-width="3" filter="url(#glow)"/>
    <!-- Chest display -->
    <rect x="-30" y="45" width="60" height="35" rx="4" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.6"/>
    <line x1="-20" y1="55" x2="20" y2="55" stroke="#FF00FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-20" y1="63" x2="10" y2="63" stroke="#FF00FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-20" y1="71" x2="15" y2="71" stroke="#FF00FF" stroke-width="1.5" opacity="0.5"/>
    <!-- Arms -->
    <rect x="-75" y="35" width="20" height="60" rx="5" fill="none" stroke="#FF00FF" stroke-width="2.5"/>
    <rect x="55" y="35" width="20" height="60" rx="5" fill="none" stroke="#FF00FF" stroke-width="2.5"/>
    <!-- Legs -->
    <rect x="-35" y="120" width="25" height="50" rx="5" fill="none" stroke="#FF00FF" stroke-width="2.5"/>
    <rect x="10" y="120" width="25" height="50" rx="5" fill="none" stroke="#FF00FF" stroke-width="2.5"/>
  </g>

  <!-- Robot/AI Agent - Left Side (desktop only) -->
  <g opacity="0.35" transform="translate(250, 400)" class="desktop-only">
    <rect x="-35" y="-40" width="70" height="60" rx="8" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-15" cy="-20" r="6" fill="#00FFFF" opacity="0.8" filter="url(#glow)"/>
    <circle cx="15" cy="-20" r="6" fill="#00FFFF" opacity="0.8" filter="url(#glow)"/>
    <line x1="0" y1="-40" x2="0" y2="-60" stroke="#00FFFF" stroke-width="2"/>
    <circle cx="0" cy="-60" r="4" fill="#00FFFF" filter="url(#glow)"/>
    <rect x="-20" y="0" width="40" height="6" rx="2" fill="#00FFFF" opacity="0.5"/>
    <rect x="-40" y="25" width="80" height="70" rx="6" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)"/>
    <rect x="-25" y="40" width="50" height="28" rx="3" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Robot/AI Agent - Right Side (desktop only) -->
  <g opacity="0.35" transform="translate(1670, 600)" class="desktop-only">
    <rect x="-35" y="-40" width="70" height="60" rx="8" fill="none" stroke="#FF00FF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-15" cy="-20" r="6" fill="#FF00FF" opacity="0.8" filter="url(#glow)"/>
    <circle cx="15" cy="-20" r="6" fill="#FF00FF" opacity="0.8" filter="url(#glow)"/>
    <line x1="0" y1="-40" x2="0" y2="-60" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="0" cy="-60" r="4" fill="#FF00FF" filter="url(#glow)"/>
    <rect x="-20" y="0" width="40" height="6" rx="2" fill="#FF00FF" opacity="0.5"/>
    <rect x="-40" y="25" width="80" height="70" rx="6" fill="none" stroke="#FF00FF" stroke-width="2.5" filter="url(#glow)"/>
    <rect x="-25" y="40" width="50" height="28" rx="3" fill="none" stroke="#FF00FF" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Smaller AI Agent Icons - Mobile friendly positioning -->
  <g opacity="0.35" transform="translate(1400, 300)" class="mobile-subtle">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-8" cy="-6" r="4" fill="#00FFFF" filter="url(#glow)"/>
    <circle cx="8" cy="-6" r="4" fill="#00FFFF" filter="url(#glow)"/>
    <path d="M -10,6 Q 0,12 10,6" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-30" x2="0" y2="-42" stroke="#00FFFF" stroke-width="2"/>
    <circle cx="0" cy="-42" r="3" fill="#00FFFF" filter="url(#glow)"/>
  </g>

  <g opacity="0.35" transform="translate(520, 700)" class="mobile-subtle">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FF00FF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-8" cy="-6" r="4" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="8" cy="-6" r="4" fill="#FF00FF" filter="url(#glow)"/>
    <path d="M -10,6 Q 0,12 10,6" fill="none" stroke="#FF00FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-30" x2="0" y2="-42" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="0" cy="-42" r="3" fill="#FF00FF" filter="url(#glow)"/>
  </g>

  <!-- AI Brain/Neural Network Icon - Center Top -->
  <g opacity="0.35" transform="translate(960, 200)" class="mobile-subtle">
    <ellipse cx="0" cy="0" rx="55" ry="45" fill="none" stroke="#FF00FF" stroke-width="2.5" filter="url(#glow)"/>
    <path d="M -35,-18 Q -45,-30 -30,-38 T -8,-35" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.7"/>
    <path d="M 35,-18 Q 45,-30 30,-38 T 8,-35" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.7"/>
    <circle cx="-20" cy="-8" r="3.5" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="20" cy="-8" r="3.5" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="0" cy="8" r="3.5" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="-12" cy="16" r="2.5" fill="#FF00FF" opacity="0.7"/>
    <circle cx="12" cy="16" r="2.5" fill="#FF00FF" opacity="0.7"/>
    <line x1="-20" y1="-8" x2="0" y2="8" stroke="#FF00FF" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="-8" x2="0" y2="8" stroke="#FF00FF" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="8" x2="-12" y2="16" stroke="#FF00FF" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="8" x2="12" y2="16" stroke="#FF00FF" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Floating Tech Icons - better positioned for mobile -->
  <g opacity="0.25" class="mobile-subtle">
    <!-- Chip/Circuit icon -->
    <g transform="translate(700, 320)" class="mobile-subtle">
      <rect x="-18" y="-18" width="36" height="36" rx="4" fill="none" stroke="#FF00FF" stroke-width="2"/>
      <rect x="-9" y="-9" width="18" height="18" fill="none" stroke="#FF00FF" stroke-width="1.5"/>
      <line x1="-18" y1="-9" x2="-26" y2="-9" stroke="#FF00FF" stroke-width="2"/>
      <line x1="-18" y1="0" x2="-26" y2="0" stroke="#FF00FF" stroke-width="2"/>
      <line x1="-18" y1="9" x2="-26" y2="9" stroke="#FF00FF" stroke-width="2"/>
      <line x1="18" y1="-9" x2="26" y2="-9" stroke="#FF00FF" stroke-width="2"/>
      <line x1="18" y1="0" x2="26" y2="0" stroke="#FF00FF" stroke-width="2"/>
      <line x1="18" y1="9" x2="26" y2="9" stroke="#FF00FF" stroke-width="2"/>
    </g>

    <!-- Gear icon -->
    <g transform="translate(1220, 520)" class="desktop-only">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#00FFFF" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#00FFFF" stroke-width="2"/>
      <rect x="-3.5" y="-25" width="7" height="7" fill="#00FFFF" opacity="0.6"/>
      <rect x="-3.5" y="18" width="7" height="7" fill="#00FFFF" opacity="0.6"/>
      <rect x="-25" y="-3.5" width="7" height="7" fill="#00FFFF" opacity="0.6"/>
      <rect x="18" y="-3.5" width="7" height="7" fill="#00FFFF" opacity="0.6"/>
    </g>
  </g>

  <!-- Code brackets with AI context - repositioned for mobile -->
  <g opacity="0.28" class="mobile-subtle">
    <text x="200" y="220" font-family="'Courier New', monospace" font-size="28" fill="#FF00FF" filter="url(#glow)" class="desktop-only">&lt;AI/&gt;</text>
    <text x="1580" y="380" font-family="'Courier New', monospace" font-size="28" fill="#FF00FF" filter="url(#glow)" class="desktop-only">{ AI }</text>
    <text x="960" y="160" font-family="'Courier New', monospace" font-size="24" fill="#00FFFF" filter="url(#glow)" text-anchor="middle">AI.code()</text>
    <text x="350" y="850" font-family="'Courier New', monospace" font-size="22" fill="#00FFFF" filter="url(#glow)" class="desktop-only">execute()</text>
    <text x="1400" y="880" font-family="'Courier New', monospace" font-size="22" fill="#FF00FF" filter="url(#glow)" class="desktop-only">discover()</text>
  </g>

  <!-- Connection lines - simplified for mobile -->
  <g opacity="0.15" class="mobile-subtle">
    <line x1="700" y1="320" x2="960" y2="400" stroke="#FF00FF" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="1400" y1="300" x2="960" y2="400" stroke="#00FFFF" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="520" y1="700" x2="960" y2="550" stroke="#FF00FF" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="250" y1="450" x2="960" y2="450" stroke="#00FFFF" stroke-width="2" stroke-dasharray="5,5" class="desktop-only"/>
    <line x1="1670" y1="600" x2="960" y2="500" stroke="#FF00FF" stroke-width="2" stroke-dasharray="5,5" class="desktop-only"/>
  </g>

  <!-- Data particles floating - optimized for mobile -->
  <g opacity="0.25" class="mobile-subtle">
    <circle cx="850" cy="400" r="3" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="1070" cy="380" r="2.5" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="960" cy="600" r="3" fill="#00FFFF" filter="url(#glow)"/>
    <circle cx="1150" cy="480" r="2.5" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="770" cy="520" r="3" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="600" cy="650" r="2.5" fill="#00FFFF" filter="url(#glow)" class="desktop-only"/>
    <circle cx="1300" cy="650" r="2.5" fill="#FF00FF" filter="url(#glow)" class="desktop-only"/>
  </g>

  <!-- Central hub indicator - smaller for mobile -->
  <g opacity="0.22" transform="translate(960, 500)" class="mobile-subtle">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#FF00FF" stroke-width="2" stroke-dasharray="8,8" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#FF00FF" stroke-width="2" stroke-dasharray="6,6" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="6" fill="#00FFFF" filter="url(#glow)"/>
  </g>

  <style>
    @media (max-width: 768px) {
      .desktop-only {
        display: none;
      }
      .mobile-subtle {
        opacity: 0.15 !important;
      }
    }
  </style>
</svg>
