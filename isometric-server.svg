<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
	 width="800px" height="800px" viewBox="0 0 32 32">
<style type="text/css">
	.server_top{fill:#64748b;}
	.server_left{fill:#475569;}
	.server_right{fill:#334155;}
	.server_light_green{fill:#22c55e;}
	.server_light_blue{fill:#60A5FA;}
	.server_vent{fill:#1e293b;}
</style>
<g>
	<!-- Server Unit 1 (bottom) -->
	<polygon class="server_top" points="16,18 6,23 16,28 26,23"/>
	<polygon class="server_left" points="6,23 6,26 16,31 16,28"/>
	<polygon class="server_right" points="26,23 26,26 16,31 16,28"/>
	<!-- Lights on left face -->
	<circle class="server_light_green" cx="8" cy="24.5" r="0.6"/>
	<circle class="server_light_blue" cx="9.5" cy="23.7" r="0.6"/>
	<!-- Vents on right face -->
	<polygon class="server_vent" points="18,28.5 18,29.5 24,26 24,25"/>

	<!-- Server Unit 2 (middle) -->
	<polygon class="server_top" points="16,12 6,17 16,22 26,17"/>
	<polygon class="server_left" points="6,17 6,20 16,25 16,22"/>
	<polygon class="server_right" points="26,17 26,20 16,25 16,22"/>
	<!-- Lights -->
	<circle class="server_light_green" cx="8" cy="18.5" r="0.6"/>
	<circle class="server_light_green" cx="9.5" cy="17.7" r="0.6"/>
	<!-- Vents -->
	<polygon class="server_vent" points="18,22.5 18,23.5 24,20 24,19"/>

	<!-- Server Unit 3 (top) -->
	<polygon class="server_top" points="16,6 6,11 16,16 26,11"/>
	<polygon class="server_left" points="6,11 6,14 16,19 16,16"/>
	<polygon class="server_right" points="26,11 26,14 16,19 16,16"/>
	<!-- Lights -->
	<circle class="server_light_blue" cx="8" cy="12.5" r="0.6"/>
	<circle class="server_light_green" cx="9.5" cy="11.7" r="0.6"/>
	<!-- Vents -->
	<polygon class="server_vent" points="18,16.5 18,17.5 24,14 24,13"/>
</g>
</svg>
