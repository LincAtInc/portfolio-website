<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I‹N›C Brain — Algorithmic Art</title>
<style>
  body { margin: 0; background: #0a0f1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
// INC Brain Hemisphere — Algorithmic Art
// Right = I (Insight) = Blue/Cyan
// Left = C (Create/Material) = Magenta/Pink
// Centre = <N> (Narrate) = Purple bridge that amplifies both

let particles = [];
const NUM_PARTICLES = 800;
let time = 0;

function setup() {
  createCanvas(1440, 810);
  colorMode(HSB, 360, 100, 100, 100);

  // Seed particles along brain hemisphere shapes
  for (let i = 0; i < NUM_PARTICLES; i++) {
    let angle = random(TWO_PI);
    let r = random(50, 280);
    let side = random() > 0.5 ? 1 : -1; // left or right hemisphere

    // Brain-like shape distortion
    let brainShape = 1 + 0.3 * sin(angle * 2) + 0.1 * sin(angle * 3);
    let x = width / 2 + side * abs(cos(angle)) * r * brainShape;
    let y = height / 2 + sin(angle) * r * 0.85 * brainShape;

    particles.push({
      x: x,
      y: y,
      origX: x,
      origY: y,
      side: side,
      vx: 0,
      vy: 0,
      size: random(1.5, 4),
      speed: random(0.3, 1.2),
      phase: random(TWO_PI),
      layer: floor(random(3)) // 0=deep, 1=mid, 2=surface
    });
  }

  noStroke();
}

function draw() {
  // Trailing fade
  background(7, 40, 7, 8);
  time += 0.008;

  let cx = width / 2;
  let cy = height / 2;

  // Draw the central purple bridge glow (corpus callosum / <N>)
  drawNarrateBridge(cx, cy);

  // Draw particles
  for (let p of particles) {
    // Flow field influence
    let noiseScale = 0.003;
    let noiseVal = noise(p.x * noiseScale, p.y * noiseScale, time);
    let flowAngle = noiseVal * TWO_PI * 2;

    // Distance from centre (the N bridge)
    let distFromCentre = abs(p.x - cx);
    let distFromCentreNorm = constrain(distFromCentre / 300, 0, 1);

    // N amplification — particles near centre get pushed outward
    let amplifyForce = map(distFromCentre, 0, 150, 0.8, 0);
    amplifyForce = max(0, amplifyForce);
    let pushDir = p.side;

    // Movement
    p.vx += cos(flowAngle) * p.speed * 0.15;
    p.vy += sin(flowAngle) * p.speed * 0.15;
    p.vx += pushDir * amplifyForce * 0.3; // N pushes outward

    // Return force to origin
    p.vx += (p.origX - p.x) * 0.008;
    p.vy += (p.origY - p.y) * 0.008;

    // Breathing motion
    let breathe = sin(time * 2 + p.phase) * 0.5;
    p.vx += breathe * pushDir * 0.1;

    // Damping
    p.vx *= 0.92;
    p.vy *= 0.92;

    p.x += p.vx;
    p.y += p.vy;

    // Colour based on hemisphere
    let hue, sat, bri, alpha;

    if (p.side > 0) {
      // RIGHT = I = Blue/Cyan (#60a5fa / #06b6d4)
      hue = map(distFromCentreNorm, 0, 1, 260, 190); // purple → cyan
      sat = map(p.layer, 0, 2, 60, 85);
      bri = map(p.layer, 0, 2, 50, 95);
      alpha = map(distFromCentreNorm, 0, 1, 40, 80);
    } else {
      // LEFT = C = Magenta/Pink (#ff00ff)
      hue = map(distFromCentreNorm, 0, 1, 280, 320); // purple → magenta
      sat = map(p.layer, 0, 2, 55, 90);
      bri = map(p.layer, 0, 2, 50, 95);
      alpha = map(distFromCentreNorm, 0, 1, 40, 80);
    }

    // Pulse brightness near centre (N energy)
    if (distFromCentre < 120) {
      let pulse = sin(time * 4 + p.phase) * 0.5 + 0.5;
      bri = lerp(bri, 100, pulse * 0.5);
      alpha += 20;
      hue = lerp(hue, 270, 0.5); // shift toward purple near N
    }

    fill(hue, sat, bri, alpha);

    let displaySize = p.size * (1 + sin(time * 3 + p.phase) * 0.3);
    ellipse(p.x, p.y, displaySize, displaySize);
  }

  // Draw neural connection lines between nearby particles
  stroke(270, 50, 80, 5);
  strokeWeight(0.5);
  for (let i = 0; i < particles.length; i += 3) {
    for (let j = i + 1; j < particles.length; j += 5) {
      let d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
      if (d < 40 && d > 5) {
        let connectionAlpha = map(d, 5, 40, 12, 2);
        // Cross-hemisphere connections near centre are brighter
        if (particles[i].side !== particles[j].side) {
          connectionAlpha *= 2.5;
        }
        stroke(270, 40, 70, connectionAlpha);
        line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
      }
    }
  }
  noStroke();

  // Draw labels
  drawLabels(cx, cy);
}

function drawNarrateBridge(cx, cy) {
  // Central vertical glow — the corpus callosum / <N>
  for (let i = 0; i < 30; i++) {
    let alpha = map(i, 0, 30, 15, 1);
    let w = map(i, 0, 30, 4, 120);
    let pulse = sin(time * 3) * 0.2 + 0.8;

    fill(270, 70, 80 * pulse, alpha);
    rectMode(CENTER);
    rect(cx, cy, w, 400 - i * 8, 100);
  }

  // Radiating energy lines from centre
  for (let i = 0; i < 12; i++) {
    let angle = (i / 12) * PI - HALF_PI; // spread across top half
    let pulse = sin(time * 2 + i * 0.5) * 0.5 + 0.5;
    let len = 80 + pulse * 60;

    // Left side (magenta)
    stroke(310, 70, 80, 8 + pulse * 8);
    strokeWeight(1.5);
    let lx = cx - cos(angle) * 30;
    let ly = cy + sin(angle) * 30;
    line(lx, ly, lx - cos(angle) * len, ly + sin(angle) * len * 0.6);

    // Right side (cyan)
    stroke(200, 70, 80, 8 + pulse * 8);
    let rx = cx + cos(angle) * 30;
    let ry = cy + sin(angle) * 30;
    line(rx, ry, rx + cos(angle) * len, ry + sin(angle) * len * 0.6);
  }
  noStroke();
}

function drawLabels(cx, cy) {
  // Minimal typography
  textAlign(CENTER, CENTER);

  // I — right hemisphere
  fill(200, 70, 90, 70);
  textFont('monospace');
  textSize(28);
  text('I', cx + 220, cy - 180);
  textSize(11);
  fill(200, 40, 70, 50);
  text('INSIGHT', cx + 220, cy - 155);

  // C — left hemisphere
  fill(310, 70, 90, 70);
  textSize(28);
  text('C', cx - 220, cy - 180);
  textSize(11);
  fill(310, 40, 70, 50);
  text('MATERIAL', cx - 220, cy - 155);

  // <N> — centre
  fill(270, 60, 95, 80);
  textSize(32);
  let pulse = sin(time * 2) * 0.1 + 0.9;
  fill(270, 60, 95 * pulse, 80);
  text('<N>', cx, cy - 220);
  textSize(11);
  fill(270, 40, 70, 50);
  text('NARRATE', cx, cy - 195);

  // Subtitle
  fill(0, 0, 60, 30);
  textSize(10);
  text('the bridge that amplifies both hemispheres', cx, cy + 240);
}
</script>
</body>
</html>
