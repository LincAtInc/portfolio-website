<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toroidal Resonance — INC Framework</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button { margin-bottom: 0; }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group { margin-bottom: 16px; }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active { transform: translateY(0); }

        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: #0f172a;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            padding: 200px 0;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Toroidal Resonance</h1>
            <div class="subtitle">Three nested tori expressing the INC framework — Ideate, Narrate, Create — as concentric fields of creative energy.</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&#8592; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &#8594;</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">&#8635; Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Inner Radius (Ideate)</label>
                    <div class="slider-container">
                        <input type="range" id="innerRadius" min="40" max="120" step="5" value="70" oninput="updateParam('innerRadius', this.value)">
                        <span class="value-display" id="innerRadius-value">70</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Middle Radius (Narrate)</label>
                    <div class="slider-container">
                        <input type="range" id="midRadius" min="100" max="220" step="5" value="160" oninput="updateParam('midRadius', this.value)">
                        <span class="value-display" id="midRadius-value">160</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Outer Radius (Create)</label>
                    <div class="slider-container">
                        <input type="range" id="outerRadius" min="180" max="350" step="5" value="260" oninput="updateParam('outerRadius', this.value)">
                        <span class="value-display" id="outerRadius-value">260</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Tube Thickness</label>
                    <div class="slider-container">
                        <input type="range" id="tubeRadius" min="10" max="60" step="2" value="30" oninput="updateParam('tubeRadius', this.value)">
                        <span class="value-display" id="tubeRadius-value">30</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Wireframe Density</label>
                    <div class="slider-container">
                        <input type="range" id="meshDensity" min="12" max="48" step="4" value="28" oninput="updateParam('meshDensity', this.value)">
                        <span class="value-display" id="meshDensity-value">28</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Rotation Speed</label>
                    <div class="slider-container">
                        <input type="range" id="rotSpeed" min="0.1" max="2.0" step="0.1" value="0.6" oninput="updateParam('rotSpeed', this.value)">
                        <span class="value-display" id="rotSpeed-value">0.6</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Energy Particles</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="20" max="200" step="10" value="80" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">80</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Glow Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="glowIntensity" min="0.2" max="1.0" step="0.1" value="0.6" oninput="updateParam('glowIntensity', this.value)">
                        <span class="value-display" id="glowIntensity-value">0.6</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Tilt Angle</label>
                    <div class="slider-container">
                        <input type="range" id="tiltAngle" min="0.2" max="1.2" step="0.05" value="0.55" oninput="updateParam('tiltAngle', this.value)">
                        <span class="value-display" id="tiltAngle-value">0.55</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Ideate (Inner)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#2563eb" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#2563eb</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Narrate (Middle)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#8b5cf6" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#8b5cf6</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Create (Outer)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#06b6d4" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#06b6d4</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="exportImage()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing toroidal resonance...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        // PARAMETERS
        // ═══════════════════════════════════════════════════════════════════

        let params = {
            seed: 42,
            innerRadius: 70,
            midRadius: 160,
            outerRadius: 260,
            tubeRadius: 30,
            meshDensity: 28,
            rotSpeed: 0.6,
            particleCount: 80,
            glowIntensity: 0.6,
            tiltAngle: 0.55,
            colorPalette: ['#2563eb', '#8b5cf6', '#06b6d4']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════════
        // TOROIDAL RESONANCE ALGORITHM
        // ═══════════════════════════════════════════════════════════════════

        let particles = [];
        let time = 0;
        let pg; // offscreen graphics for glow

        function setup() {
            let canvas = createCanvas(1024, 1024);
            canvas.parent('canvas-container');
            pg = createGraphics(1024, 1024);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new EnergyParticle(i));
            }
            time = 0;
        }

        function hexToRgbArr(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b];
        }

        // Project 3D point to 2D with perspective
        function project(x, y, z) {
            let fov = 800;
            let viewZ = 600;
            let scale = fov / (viewZ + z);
            return {
                x: width / 2 + x * scale,
                y: height / 2 + y * scale,
                scale: scale,
                z: z
            };
        }

        // Rotate point around X axis
        function rotX(x, y, z, a) {
            let cy = y * cos(a) - z * sin(a);
            let cz = y * sin(a) + z * cos(a);
            return [x, cy, cz];
        }

        // Rotate point around Y axis
        function rotY(x, y, z, a) {
            let cx = x * cos(a) + z * sin(a);
            let cz = -x * sin(a) + z * cos(a);
            return [cx, y, cz];
        }

        // Rotate point around Z axis
        function rotZ(x, y, z, a) {
            let cx = x * cos(a) - y * sin(a);
            let cy = x * sin(a) + y * cos(a);
            return [cx, cy, z];
        }

        // Generate torus wireframe points
        function getTorusPoint(R, r, u, v) {
            let x = (R + r * cos(v)) * cos(u);
            let y = (R + r * cos(v)) * sin(u);
            let z = r * sin(v);
            return [x, y, z];
        }

        function drawTorusWireframe(R, r, col, alpha, rotAngle, rotSpeed2, density) {
            let c = hexToRgbArr(col);
            let segments = Math.floor(density);
            let tubeSegments = Math.floor(density * 0.7);

            // Collect all lines with z-depth for this torus
            let lines = [];

            // Longitudinal lines (around the ring)
            for (let i = 0; i < tubeSegments; i++) {
                let v = (i / tubeSegments) * TWO_PI;
                for (let j = 0; j < segments; j++) {
                    let u1 = (j / segments) * TWO_PI;
                    let u2 = ((j + 1) / segments) * TWO_PI;

                    let p1 = getTorusPoint(R, r, u1, v);
                    let p2 = getTorusPoint(R, r, u2, v);

                    // Apply rotations
                    p1 = rotY(p1[0], p1[1], p1[2], rotAngle);
                    p1 = rotX(p1[0], p1[1], p1[2], params.tiltAngle);
                    p1 = rotZ(p1[0], p1[1], p1[2], time * rotSpeed2 * 0.3);

                    p2 = rotY(p2[0], p2[1], p2[2], rotAngle);
                    p2 = rotX(p2[0], p2[1], p2[2], params.tiltAngle);
                    p2 = rotZ(p2[0], p2[1], p2[2], time * rotSpeed2 * 0.3);

                    let pr1 = project(p1[0], p1[1], p1[2]);
                    let pr2 = project(p2[0], p2[1], p2[2]);

                    let avgZ = (p1[2] + p2[2]) / 2;
                    let depthAlpha = map(avgZ, -R - r, R + r, 0.15, 1.0);

                    lines.push({
                        x1: pr1.x, y1: pr1.y,
                        x2: pr2.x, y2: pr2.y,
                        z: avgZ,
                        alpha: alpha * depthAlpha * params.glowIntensity
                    });
                }
            }

            // Latitudinal lines (around the tube)
            for (let j = 0; j < segments; j++) {
                let u = (j / segments) * TWO_PI;
                for (let i = 0; i < tubeSegments; i++) {
                    let v1 = (i / tubeSegments) * TWO_PI;
                    let v2 = ((i + 1) / tubeSegments) * TWO_PI;

                    let p1 = getTorusPoint(R, r, u, v1);
                    let p2 = getTorusPoint(R, r, u, v2);

                    p1 = rotY(p1[0], p1[1], p1[2], rotAngle);
                    p1 = rotX(p1[0], p1[1], p1[2], params.tiltAngle);
                    p1 = rotZ(p1[0], p1[1], p1[2], time * rotSpeed2 * 0.3);

                    p2 = rotY(p2[0], p2[1], p2[2], rotAngle);
                    p2 = rotX(p2[0], p2[1], p2[2], params.tiltAngle);
                    p2 = rotZ(p2[0], p2[1], p2[2], time * rotSpeed2 * 0.3);

                    let pr1 = project(p1[0], p1[1], p1[2]);
                    let pr2 = project(p2[0], p2[1], p2[2]);

                    let avgZ = (p1[2] + p2[2]) / 2;
                    let depthAlpha = map(avgZ, -R - r, R + r, 0.15, 1.0);

                    lines.push({
                        x1: pr1.x, y1: pr1.y,
                        x2: pr2.x, y2: pr2.y,
                        z: avgZ,
                        alpha: alpha * depthAlpha * params.glowIntensity
                    });
                }
            }

            // Draw all lines
            for (let l of lines) {
                // Glow layer
                stroke(c[0], c[1], c[2], l.alpha * 40);
                strokeWeight(3);
                line(l.x1, l.y1, l.x2, l.y2);

                // Core line
                stroke(c[0], c[1], c[2], l.alpha * 180);
                strokeWeight(0.8);
                line(l.x1, l.y1, l.x2, l.y2);
            }
        }

        // Energy particle that flows between tori
        class EnergyParticle {
            constructor(index) {
                this.index = index;
                this.layer = floor(random(3)); // 0=inner, 1=mid, 2=outer
                this.u = random(TWO_PI);
                this.v = random(TWO_PI);
                this.speed = random(0.005, 0.025);
                this.vSpeed = random(0.01, 0.04);
                this.trail = [];
                this.maxTrail = floor(random(8, 20));
                this.brightness = random(0.4, 1.0);
                // Transition properties
                this.transitioning = false;
                this.transitionProgress = 0;
                this.fromLayer = 0;
                this.toLayer = 0;
                this.transitionChance = random(0.0005, 0.002);
            }

            getRadius() {
                if (this.layer === 0) return params.innerRadius;
                if (this.layer === 1) return params.midRadius;
                return params.outerRadius;
            }

            getTubeR() {
                let base = params.tubeRadius;
                if (this.layer === 0) return base * 0.7;
                if (this.layer === 1) return base * 0.85;
                return base;
            }

            getRotAngle() {
                let s = params.rotSpeed;
                if (this.layer === 0) return time * s * 0.015;
                if (this.layer === 1) return time * s * 0.01;
                return time * s * 0.006;
            }

            getRotSpeed2() {
                if (this.layer === 0) return params.rotSpeed * 1.5;
                if (this.layer === 1) return params.rotSpeed;
                return params.rotSpeed * 0.6;
            }

            update() {
                this.u += this.speed;
                this.v += this.vSpeed;

                // Chance to transition between layers
                if (!this.transitioning && random() < this.transitionChance) {
                    this.transitioning = true;
                    this.transitionProgress = 0;
                    this.fromLayer = this.layer;
                    // Move to adjacent layer
                    if (this.layer === 0) this.toLayer = 1;
                    else if (this.layer === 2) this.toLayer = 1;
                    else this.toLayer = random() > 0.5 ? 0 : 2;
                }

                if (this.transitioning) {
                    this.transitionProgress += 0.02;
                    if (this.transitionProgress >= 1) {
                        this.transitioning = false;
                        this.layer = this.toLayer;
                    }
                }

                // Calculate 3D position
                let R, r, rotAngle, rotSpeed2;
                if (this.transitioning) {
                    let fromR = this.fromLayer === 0 ? params.innerRadius : this.fromLayer === 1 ? params.midRadius : params.outerRadius;
                    let toR = this.toLayer === 0 ? params.innerRadius : this.toLayer === 1 ? params.midRadius : params.outerRadius;
                    R = lerp(fromR, toR, this.transitionProgress);
                    r = this.getTubeR();
                    let s = params.rotSpeed;
                    let fromRot = this.fromLayer === 0 ? time * s * 0.015 : this.fromLayer === 1 ? time * s * 0.01 : time * s * 0.006;
                    let toRot = this.toLayer === 0 ? time * s * 0.015 : this.toLayer === 1 ? time * s * 0.01 : time * s * 0.006;
                    rotAngle = lerp(fromRot, toRot, this.transitionProgress);
                    rotSpeed2 = lerp(
                        this.fromLayer === 0 ? s * 1.5 : this.fromLayer === 1 ? s : s * 0.6,
                        this.toLayer === 0 ? s * 1.5 : this.toLayer === 1 ? s : s * 0.6,
                        this.transitionProgress
                    );
                } else {
                    R = this.getRadius();
                    r = this.getTubeR();
                    rotAngle = this.getRotAngle();
                    rotSpeed2 = this.getRotSpeed2();
                }

                let p = getTorusPoint(R, r, this.u, this.v);
                p = rotY(p[0], p[1], p[2], rotAngle);
                p = rotX(p[0], p[1], p[2], params.tiltAngle);
                p = rotZ(p[0], p[1], p[2], time * rotSpeed2 * 0.3);

                let projected = project(p[0], p[1], p[2]);

                this.trail.push({ x: projected.x, y: projected.y, z: p[2] });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
            }

            display() {
                let colIdx = this.transitioning ?
                    (this.transitionProgress < 0.5 ? this.fromLayer : this.toLayer) :
                    this.layer;
                let col = hexToRgbArr(params.colorPalette[colIdx]);

                // Draw trail
                noFill();
                for (let i = 1; i < this.trail.length; i++) {
                    let a = map(i, 0, this.trail.length, 0, 200 * this.brightness * params.glowIntensity);
                    let w = map(i, 0, this.trail.length, 0.5, 2.5);

                    // Glow
                    stroke(col[0], col[1], col[2], a * 0.3);
                    strokeWeight(w + 3);
                    line(this.trail[i - 1].x, this.trail[i - 1].y, this.trail[i].x, this.trail[i].y);

                    // Core
                    stroke(col[0], col[1], col[2], a);
                    strokeWeight(w);
                    line(this.trail[i - 1].x, this.trail[i - 1].y, this.trail[i].x, this.trail[i].y);
                }

                // Head glow
                if (this.trail.length > 0) {
                    let head = this.trail[this.trail.length - 1];
                    noStroke();
                    fill(col[0], col[1], col[2], 60 * this.brightness * params.glowIntensity);
                    ellipse(head.x, head.y, 8, 8);
                    fill(255, 255, 255, 120 * this.brightness * params.glowIntensity);
                    ellipse(head.x, head.y, 2.5, 2.5);
                }
            }
        }

        function draw() {
            background(15, 23, 42); // #0f172a

            // Subtle radial glow in center
            noStroke();
            for (let i = 5; i > 0; i--) {
                let r = i * 80;
                fill(37, 99, 235, 3 * params.glowIntensity);
                ellipse(width / 2, height / 2, r, r);
            }

            let s = params.rotSpeed;

            // Draw tori from back to front (outer first for depth)
            // Outer torus (Create) - slowest, most ethereal
            drawTorusWireframe(
                params.outerRadius,
                params.tubeRadius,
                params.colorPalette[2],
                0.35,
                time * s * 0.006,
                s * 0.6,
                params.meshDensity * 0.6
            );

            // Middle torus (Narrate) - medium speed
            drawTorusWireframe(
                params.midRadius,
                params.tubeRadius * 0.85,
                params.colorPalette[1],
                0.55,
                time * s * 0.01,
                s,
                params.meshDensity * 0.8
            );

            // Inner torus (Ideate) - fastest, brightest
            drawTorusWireframe(
                params.innerRadius,
                params.tubeRadius * 0.7,
                params.colorPalette[0],
                0.85,
                time * s * 0.015,
                s * 1.5,
                params.meshDensity
            );

            // Update and draw particles
            for (let p of particles) {
                p.update();
                p.display();
            }

            // Adjust particle count if needed
            while (particles.length < params.particleCount) {
                particles.push(new EnergyParticle(particles.length));
            }
            while (particles.length > params.particleCount) {
                particles.pop();
            }

            time++;
        }

        // ═══════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function exportImage() {
            saveCanvas('toroidal-resonance-' + params.seed, 'png');
        }

        // ═══════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('innerRadius').value = params.innerRadius;
            document.getElementById('innerRadius-value').textContent = params.innerRadius;
            document.getElementById('midRadius').value = params.midRadius;
            document.getElementById('midRadius-value').textContent = params.midRadius;
            document.getElementById('outerRadius').value = params.outerRadius;
            document.getElementById('outerRadius-value').textContent = params.outerRadius;
            document.getElementById('tubeRadius').value = params.tubeRadius;
            document.getElementById('tubeRadius-value').textContent = params.tubeRadius;
            document.getElementById('meshDensity').value = params.meshDensity;
            document.getElementById('meshDensity-value').textContent = params.meshDensity;
            document.getElementById('rotSpeed').value = params.rotSpeed;
            document.getElementById('rotSpeed-value').textContent = params.rotSpeed;
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('glowIntensity').value = params.glowIntensity;
            document.getElementById('glowIntensity-value').textContent = params.glowIntensity;
            document.getElementById('tiltAngle').value = params.tiltAngle;
            document.getElementById('tiltAngle-value').textContent = params.tiltAngle;

            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];

            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function () {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
