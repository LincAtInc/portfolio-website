<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGradient48" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle for better visibility on LinkedIn -->
  <circle cx="24" cy="24" r="22" fill="#0f172a" opacity="0.95"/>

  <!-- Left border (forms the L) -->
  <rect x="8" y="10" width="3" height="28" fill="url(#borderGradient48)" rx="1.5"/>

  <!-- Bottom border (forms the base of L) -->
  <rect x="8" y="35" width="32" height="3" fill="url(#borderGradient48)" rx="1.5"/>

  <!-- INC text - optimized for small size -->
  <text x="13" y="32"
        font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16"
        font-weight="800"
        fill="white"
        letter-spacing="1.5"
        style="text-transform: uppercase;">INC</text>
</svg>
