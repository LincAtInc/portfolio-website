<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate LINC Logo PNG</title>
    <style>
        body {
            font-family: system-ui;
            padding: 40px;
            background: #f3f4f6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin: 0 0 10px 0; }
        p { color: #666; margin: 0 0 30px 0; }
        .preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .preview-item {
            text-align: center;
        }
        canvas {
            border: 1px solid #ddd;
            border-radius: 8px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        button {
            background: linear-gradient(135deg, #2563eb 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .success {
            display: none;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LINC Logo PNG Generator</h1>
        <p>Generate high-quality PNG versions of your LINC logo</p>

        <div class="preview">
            <div class="preview-item">
                <h3>48x48 (LinkedIn)</h3>
                <canvas id="canvas48" width="48" height="48"></canvas>
            </div>
            <div class="preview-item">
                <h3>200x80 (Website)</h3>
                <canvas id="canvas200" width="200" height="80"></canvas>
            </div>
        </div>

        <button onclick="downloadPNG(48)">Download 48x48 PNG</button>
        <button onclick="downloadPNG(200)">Download 200x80 PNG</button>

        <div id="success" class="success">PNG downloaded successfully!</div>
    </div>

    <script>
        // SVG content for 48x48 version
        const svg48 = `<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="borderGradient48" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="22" fill="#0f172a" opacity="0.95"/>
          <rect x="8" y="10" width="3" height="28" fill="url(#borderGradient48)" rx="1.5"/>
          <rect x="8" y="35" width="32" height="3" fill="url(#borderGradient48)" rx="1.5"/>
          <text x="13" y="32" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="white" letter-spacing="1.5" style="text-transform: uppercase;">INC</text>
        </svg>`;

        // SVG content for 200x80 version
        const svg200 = `<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="4" height="60" fill="url(#borderGradient)" rx="2"/>
          <rect x="10" y="66" width="120" height="4" fill="url(#borderGradient)" rx="2"/>
          <text x="28" y="55" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="6" style="text-transform: uppercase;">INC</text>
        </svg>`;

        function drawSVGToCanvas(svgString, canvasId, width, height) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');

            const img = new Image();
            const blob = new Blob([svgString], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);

            img.onload = function() {
                ctx.drawImage(img, 0, 0, width, height);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        function downloadPNG(size) {
            const canvasId = size === 48 ? 'canvas48' : 'canvas200';
            const canvas = document.getElementById(canvasId);
            const filename = size === 48 ? 'linc-logo-48.png' : 'linc-logo-200x80.png';

            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                // Show success message
                const successMsg = document.getElementById('success');
                successMsg.style.display = 'block';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            });
        }

        // Draw canvases on load
        window.onload = function() {
            drawSVGToCanvas(svg48, 'canvas48', 48, 48);
            drawSVGToCanvas(svg200, 'canvas200', 200, 80);
        };
    </script>
</body>
</html>
