      <line x1="0" y1="0" x2="-45" y2="25" stroke="#FF00FF" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
      <line x1="0" y1="0" x2="45" y2="25" stroke="#FF00FF" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
      <line x1="0" y1="0" x2="0" y2="45" stroke="#FF00FF" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>

