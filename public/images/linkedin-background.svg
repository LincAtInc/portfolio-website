      <polygon points="400,50 392,46 392,54" fill="#FF00FF" filter="url(#glow)"/>

      <line x1="980" y1="50" x2="1200" y2="50" stroke="#00FFFF" stroke-width="3" stroke-dasharray="10,5" filter="url(#glow)"/>
      <polygon points="1200,50 1192,46 1192,54" fill="#00FFFF" filter="url(#glow)"/>
