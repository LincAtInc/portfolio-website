        <path d="M10,0 L3.5,0.8 L2.5,0 L3.5,-0.8 Z" fill="#00FFFF" filter="url(#glow)"/>
        <path d="M0,10 L0.8,3.5 L0,2.5 L-0.8,3.5 Z" fill="#00FFFF" filter="url(#glow)"/>
