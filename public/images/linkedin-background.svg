<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0a0e1a"/>

  <!-- Grid pattern -->
  <g opacity="0.02">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
    </pattern>
    <rect width="1584" height="396" fill="url(#grid)" />
  </g>

  <!-- Wave forms for directional flow (background) -->
  <g opacity="0.18">
    <!-- Cyan waves from left - flowing and intertwining -->
    <path d="M 0,175 Q 198,130 396,175 T 792,175 Q 990,175 1188,220 T 1584,220" fill="none" stroke="#00FFFF" stroke-width="55" stroke-linecap="round" opacity="0.5" filter="url(#strongGlow)"/>
    <path d="M 0,205 Q 198,160 396,205 T 792,205 Q 990,205 1188,160 T 1584,160" fill="none" stroke="#00FFFF" stroke-width="45" stroke-linecap="round" opacity="0.35" filter="url(#strongGlow)"/>
    <path d="M 0,190 Q 198,240 396,190 T 792,190 Q 990,190 1188,140 T 1584,140" fill="none" stroke="#00FFFF" stroke-width="35" stroke-linecap="round" opacity="0.25" filter="url(#strongGlow)"/>

    <!-- Magenta waves from right - flowing and intertwining opposite -->
    <path d="M 1584,190 Q 1386,145 1188,190 T 792,190 Q 594,190 396,235 T 0,235" fill="none" stroke="#FF00FF" stroke-width="55" stroke-linecap="round" opacity="0.5" filter="url(#strongGlow)"/>
    <path d="M 1584,220 Q 1386,175 1188,220 T 792,220 Q 594,220 396,175 T 0,175" fill="none" stroke="#FF00FF" stroke-width="45" stroke-linecap="round" opacity="0.35" filter="url(#strongGlow)"/>
    <path d="M 1584,205 Q 1386,255 1188,205 T 792,205 Q 594,205 396,155 T 0,155" fill="none" stroke="#FF00FF" stroke-width="35" stroke-linecap="round" opacity="0.25" filter="url(#strongGlow)"/>
  </g>

  <!-- Discovery to Delivery Flow at TOP -->
  <g opacity="0.5">
    <!-- Discovery text on left -->
    <text x="40" y="60" font-family="'Inter', 'SF Pro', system-ui, sans-serif" font-size="26" font-weight="700" fill="#00FFFF" filter="url(#glow)">DISCOVERY</text>

    <!-- Flow arrows -->
    <g opacity="0.7">
