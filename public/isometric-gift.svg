<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
	 width="800px" height="800px" viewBox="0 0 32 32">
<style type="text/css">
	.box_top{fill:#f472b6;}
	.box_left{fill:#ec4899;}
	.box_right{fill:#be185d;}
	.ribbon_top{fill:#fbbf24;}
	.ribbon_left{fill:#f59e0b;}
	.ribbon_right{fill:#d97706;}
	.bow_left{fill:#fbbf24;}
	.bow_right{fill:#f59e0b;}
	.bow_center{fill:#d97706;}
</style>
<g>
	<!-- Gift Box - standard isometric cube -->
	<!-- Top face -->
	<polygon class="box_top" points="16,10 6,15 16,20 26,15"/>
	<!-- Left face -->
	<polygon class="box_left" points="6,15 6,25 16,30 16,20"/>
	<!-- Right face -->
	<polygon class="box_right" points="26,15 26,25 16,30 16,20"/>

	<!-- Ribbon on top - horizontal band (follows isometric grid) -->
	<polygon class="ribbon_top" points="16,12 10,15 16,18 22,15"/>

	<!-- Ribbon on top - vertical band -->
	<polygon class="ribbon_top" points="14,11 6,15 8,16 16,12"/>
	<polygon class="ribbon_top" points="18,11 26,15 24,16 16,12"/>

	<!-- Ribbon on left face - vertical stripe -->
	<polygon class="ribbon_left" points="10,16 10,26 12,27 12,17"/>

	<!-- Ribbon on right face - vertical stripe -->
	<polygon class="ribbon_right" points="22,16 22,26 20,27 20,17"/>

	<!-- Bow - made of isometric diamond shapes -->
	<!-- Left bow loop - isometric parallelogram -->
	<polygon class="bow_left" points="16,8 10,11 12,12 16,10"/>
	<!-- Right bow loop -->
	<polygon class="bow_right" points="16,8 22,11 20,12 16,10"/>
	<!-- Bow center knot -->
	<polygon class="bow_center" points="16,9 14,10 16,11 18,10"/>
	<!-- Bow tails -->
	<polygon class="bow_left" points="14,11 12,13 13,13.5 15,11.5"/>
	<polygon class="bow_right" points="18,11 20,13 19,13.5 17,11.5"/>
</g>
</svg>
