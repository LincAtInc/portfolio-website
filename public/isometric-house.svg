<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
	 width="800px" height="800px" viewBox="0 0 32 32">
<style type="text/css">
	.roof_left{fill:#BE1E2D;}
	.roof_right{fill:#8B1621;}
	.wall_left{fill:#F5DF89;}
	.wall_right{fill:#E5C86A;}
	.door{fill:#8B4513;}
	.window_frame{fill:#60A5FA;}
	.window_glass{fill:#93C5FD;}
	.chimney_left{fill:#F59E0B;}
	.chimney_right{fill:#D97706;}
	.chimney_top{fill:#FBBF24;}
	.base_top{fill:#7BD6C4;}
	.base_left{fill:#569080;}
	.base_right{fill:#225B49;}
</style>
<g>
	<!-- Ground/Base Platform -->
	<polygon class="base_top" points="16,26 4,20 16,14 28,20"/>
	<polygon class="base_left" points="4,20 4,22 16,28 16,26"/>
	<polygon class="base_right" points="28,20 28,22 16,28 16,26"/>

	<!-- House walls - standard isometric cube sitting on base -->
	<!-- Left wall -->
	<polygon class="wall_left" points="6,19 6,11 16,6 16,14"/>
	<!-- Right wall -->
	<polygon class="wall_right" points="26,19 26,11 16,6 16,14"/>

	<!-- Roof - two sloped faces meeting at ridge -->
	<!-- The roof peak is directly above center (16,6), going up to (16,2) -->
	<!-- Left roof slope -->
	<polygon class="roof_left" points="16,2 4,9 6,11 16,6"/>
	<!-- Right roof slope -->
	<polygon class="roof_right" points="16,2 28,9 26,11 16,6"/>

	<!-- Chimney - small isometric box on right roof -->
	<!-- Positioned along the right roof slope -->
	<polygon class="chimney_left" points="21,5 21,3 23,2 23,4"/>
	<polygon class="chimney_right" points="23,4 23,2 25,3 25,5"/>
	<polygon class="chimney_top" points="21,3 23,2 25,3 23,4"/>

	<!-- Door on left wall - parallelogram following left wall angle -->
	<polygon class="door" points="8,18.5 8,14 10,13 10,17.5"/>

	<!-- Window on left wall -->
	<polygon class="window_frame" points="12,16 12,13 14,12 14,15"/>
	<polygon class="window_glass" points="12.3,15.5 12.3,13.3 13.7,12.4 13.7,14.6"/>

	<!-- Window on right wall - note: edges slope opposite direction -->
	<polygon class="window_frame" points="20,15 20,12 18,13 18,16"/>
	<polygon class="window_glass" points="19.7,14.6 19.7,12.4 18.3,13.3 18.3,15.5"/>

	<!-- Second window on right wall -->
	<polygon class="window_frame" points="24,17 24,14 22,15 22,18"/>
	<polygon class="window_glass" points="23.7,16.6 23.7,14.4 22.3,15.3 22.3,17.5"/>
</g>
</svg>
