    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="none" stroke="#00FFFF" stroke-width="2"/>
    <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#00FFFF" stroke-width="1.5"/>
    <line x1="-20" y1="0" x2="-30" y2="0" stroke="#00FFFF" stroke-width="2"/>
    <line x1="20" y1="0" x2="30" y2="0" stroke="#00FFFF" stroke-width="2"/>
    <line x1="0" y1="-20" x2="0" y2="-30" stroke="#00FFFF" stroke-width="2"/>
    <line x1="0" y1="20" x2="0" y2="30" stroke="#00FFFF" stroke-width="2"/>
  </g>

  <!-- Medium chip - bottom center -->
  <g opacity="0.48" transform="translate(950, 960) scale(0.5)">
    <rect x="-18" y="-18" width="36" height="36" rx="3" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <rect x="-9" y="-9" width="18" height="18" fill="none" stroke="#FF00FF" stroke-width="1.5"/>
    <line x1="-18" y1="0" x2="-26" y2="0" stroke="#FF00FF" stroke-width="1.5"/>
    <line x1="18" y1="0" x2="26" y2="0" stroke="#FF00FF" stroke-width="1.5"/>
  </g>

  <!-- Small chips scattered -->
  <g opacity="0.42" transform="translate(800, 180) scale(0.35)">
    <rect x="-16" y="-16" width="32" height="32" rx="2" fill="none" stroke="#00FFFF" stroke-width="2"/>
    <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#00FFFF" stroke-width="1"/>
    <line x1="-16" y1="0" x2="-22" y2="0" stroke="#00FFFF" stroke-width="1"/>
    <line x1="16" y1="0" x2="22" y2="0" stroke="#00FFFF" stroke-width="1"/>
  </g>

  <g opacity="0.42" transform="translate(1250, 780) scale(0.35)">
    <rect x="-16" y="-16" width="32" height="32" rx="2" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#FF00FF" stroke-width="1"/>
    <line x1="0" y1="-16" x2="0" y2="-22" stroke="#FF00FF" stroke-width="1"/>
    <line x1="0" y1="16" x2="0" y2="22" stroke="#FF00FF" stroke-width="1"/>
  </g>

  <!-- ROBOT TYPE 5: Gear/Cog bots -->

  <!-- Large gear - center right -->
  <g opacity="0.5" transform="translate(1750, 680) scale(0.7)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="#00FFFF" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#00FFFF" stroke-width="2"/>
    <rect x="-5" y="-34" width="10" height="10" fill="#00FFFF" opacity="0.6"/>
    <rect x="-5" y="24" width="10" height="10" fill="#00FFFF" opacity="0.6"/>
    <rect x="-34" y="-5" width="10" height="10" fill="#00FFFF" opacity="0.6"/>
    <rect x="24" y="-5" width="10" height="10" fill="#00FFFF" opacity="0.6"/>
