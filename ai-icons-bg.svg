    <path d="M -20,0 Q -20,-12 0,-12 Q 20,-12 20,0" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="-8" cy="-4" r="3" fill="#FF00FF"/>
    <circle cx="8" cy="-4" r="3" fill="#FF00FF"/>
    <line x1="-14" y1="-16" x2="-18" y2="-24" stroke="#FF00FF" stroke-width="1.5"/>
    <line x1="14" y1="-16" x2="18" y2="-24" stroke="#FF00FF" stroke-width="1.5"/>
  </g>

  <!-- Medium android -->
  <g opacity="0.48" transform="translate(520, 780) scale(0.45)">
    <path d="M -18,0 L -18,18 Q -18,22 -12,22 L 12,22 Q 18,22 18,18 L 18,0" fill="none" stroke="#00FFFF" stroke-width="2"/>
    <path d="M -18,0 Q -18,-10 0,-10 Q 18,-10 18,0" fill="none" stroke="#00FFFF" stroke-width="2"/>
    <circle cx="-6" cy="-3" r="2.5" fill="#00FFFF"/>
    <circle cx="6" cy="-3" r="2.5" fill="#00FFFF"/>
    <line x1="-12" y1="-14" x2="-15" y2="-20" stroke="#00FFFF" stroke-width="1"/>
    <line x1="12" y1="-14" x2="15" y2="-20" stroke="#00FFFF" stroke-width="1"/>
  </g>

  <!-- Small android -->
  <g opacity="0.42" transform="translate(650, 900) scale(0.35)">
    <path d="M -16,0 L -16,16 Q -16,20 -10,20 L 10,20 Q 16,20 16,16 L 16,0" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <path d="M -16,0 Q -16,-8 0,-8 Q 16,-8 16,0" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="-5" cy="-2" r="2" fill="#FF00FF"/>
    <circle cx="5" cy="-2" r="2" fill="#FF00FF"/>
  </g>

  <!-- ROBOT TYPE 4: Chip/Circuit icons -->

  <!-- EXTRA LARGE chip - upper right -->
  <g opacity="0.52" transform="translate(1620, 300) scale(0.8)">
    <rect x="-24" y="-24" width="48" height="48" rx="5" fill="none" stroke="#FF00FF" stroke-width="2.5"/>
    <rect x="-12" y="-12" width="24" height="24" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <line x1="-24" y1="-12" x2="-34" y2="-12" stroke="#FF00FF" stroke-width="2.5"/>
    <line x1="-24" y1="0" x2="-34" y2="0" stroke="#FF00FF" stroke-width="2.5"/>
    <line x1="-24" y1="12" x2="-34" y2="12" stroke="#FF00FF" stroke-width="2.5"/>
    <line x1="24" y1="-12" x2="34" y2="-12" stroke="#FF00FF" stroke-width="2.5"/>
    <line x1="24" y1="0" x2="34" y2="0" stroke="#FF00FF" stroke-width="2.5"/>
    <line x1="24" y1="12" x2="34" y2="12" stroke="#FF00FF" stroke-width="2.5"/>
    <line x1="-12" y1="-24" x2="-12" y2="-34" stroke="#FF00FF" stroke-width="2.5"/>
    <line x1="12" y1="-24" x2="12" y2="-34" stroke="#FF00FF" stroke-width="2.5"/>
  </g>

  <!-- Large chip - left side -->
