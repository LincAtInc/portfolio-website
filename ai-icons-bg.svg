    <circle cx="-10" cy="-5" r="5" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="10" cy="-5" r="5" fill="#FF00FF" filter="url(#glow)"/>
    <rect x="-16" y="10" width="32" height="5" rx="2" fill="#FF00FF" opacity="0.5"/>
    <line x1="0" y1="-22" x2="0" y2="-38" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="0" cy="-38" r="4" fill="#FF00FF" filter="url(#glow)"/>
  </g>

  <!-- Large box bot - bottom right -->
  <g opacity="0.55" transform="translate(1720, 880) scale(0.7)">
    <rect x="-24" y="-20" width="48" height="40" rx="4" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-9" cy="-4" r="4" fill="#00FFFF" filter="url(#glow)"/>
    <circle cx="9" cy="-4" r="4" fill="#00FFFF" filter="url(#glow)"/>
    <rect x="-14" y="8" width="28" height="4" rx="1" fill="#00FFFF" opacity="0.5"/>
    <line x1="0" y1="-20" x2="0" y2="-34" stroke="#00FFFF" stroke-width="2"/>
    <circle cx="0" cy="-34" r="3.5" fill="#00FFFF" filter="url(#glow)"/>
  </g>

  <!-- Medium box bot -->
  <g opacity="0.5" transform="translate(1550, 400) scale(0.5)">
    <rect x="-20" y="-16" width="40" height="32" rx="3" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="-7" cy="-3" r="3" fill="#FF00FF"/>
    <circle cx="7" cy="-3" r="3" fill="#FF00FF"/>
    <line x1="0" y1="-16" x2="0" y2="-26" stroke="#FF00FF" stroke-width="1.5"/>
    <circle cx="0" cy="-26" r="2.5" fill="#FF00FF"/>
  </g>

  <!-- Small box bot -->
  <g opacity="0.45" transform="translate(1480, 580) scale(0.35)">
    <rect x="-18" y="-14" width="36" height="28" rx="3" fill="none" stroke="#00FFFF" stroke-width="2"/>
    <circle cx="-6" cy="-2" r="2.5" fill="#00FFFF"/>
    <circle cx="6" cy="-2" r="2.5" fill="#00FFFF"/>
    <line x1="0" y1="-14" x2="0" y2="-22" stroke="#00FFFF" stroke-width="1"/>
  </g>

  <!-- ROBOT TYPE 3: Android style -->

  <!-- EXTRA LARGE android - bottom left -->
  <g opacity="0.58" transform="translate(300, 920) scale(0.85)">
    <path d="M -24,0 L -24,26 Q -24,32 -16,32 L 16,32 Q 24,32 24,26 L 24,0" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)"/>
    <path d="M -24,0 Q -24,-14 0,-14 Q 24,-14 24,0" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-10" cy="-5" r="4" fill="#00FFFF" filter="url(#glow)"/>
    <circle cx="10" cy="-5" r="4" fill="#00FFFF" filter="url(#glow)"/>
    <line x1="-16" y1="-20" x2="-22" y2="-30" stroke="#00FFFF" stroke-width="2"/>
    <line x1="16" y1="-20" x2="22" y2="-30" stroke="#00FFFF" stroke-width="2"/>
  </g>

