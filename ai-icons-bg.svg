    <line x1="120" y1="200" x2="380" y2="320" stroke="#FF00FF" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="1780" y1="180" x2="1620" y2="300" stroke="#00FFFF" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="300" y1="920" x2="480" y2="860" stroke="#00FFFF" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="1720" y1="880" x2="1250" y2="780" stroke="#FF00FF" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="80" y1="600" x2="180" y2="420" stroke="#FF00FF" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="1750" y1="680" x2="1850" y2="520" stroke="#00FFFF" stroke-width="1" stroke-dasharray="4,4"/>
