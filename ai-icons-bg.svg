    <rect x="-4" y="-28" width="8" height="8" fill="#FF00FF" opacity="0.5"/>
    <rect x="-4" y="20" width="8" height="8" fill="#FF00FF" opacity="0.5"/>
    <rect x="-28" y="-4" width="8" height="8" fill="#FF00FF" opacity="0.5"/>
    <rect x="20" y="-4" width="8" height="8" fill="#FF00FF" opacity="0.5"/>
