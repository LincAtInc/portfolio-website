<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ROBOT TYPE 1: Round face bot (various sizes) -->

  <!-- EXTRA LARGE round bot - top left -->
  <g opacity="0.55" transform="translate(120, 200) scale(1.0)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#FF00FF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-10" cy="-6" r="5" fill="#FF00FF" filter="url(#glow)"/>
    <circle cx="10" cy="-6" r="5" fill="#FF00FF" filter="url(#glow)"/>
    <path d="M -12,10 Q 0,18 12,10" fill="none" stroke="#FF00FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-32" x2="0" y2="-48" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="0" cy="-48" r="4" fill="#FF00FF" filter="url(#glow)"/>
  </g>

  <!-- Large round bot - right side upper -->
  <g opacity="0.58" transform="translate(1780, 180) scale(0.85)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-9" cy="-6" r="4.5" fill="#00FFFF" filter="url(#glow)"/>
    <circle cx="9" cy="-6" r="4.5" fill="#00FFFF" filter="url(#glow)"/>
    <path d="M -10,9 Q 0,15 10,9" fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-30" x2="0" y2="-44" stroke="#00FFFF" stroke-width="2"/>
    <circle cx="0" cy="-44" r="3.5" fill="#00FFFF" filter="url(#glow)"/>
  </g>

  <!-- Medium round bot - top center -->
  <g opacity="0.52" transform="translate(600, 130) scale(0.55)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#softGlow)"/>
    <circle cx="-7" cy="-5" r="3.5" fill="#00FFFF"/>
    <circle cx="7" cy="-5" r="3.5" fill="#00FFFF"/>
    <line x1="0" y1="-26" x2="0" y2="-38" stroke="#00FFFF" stroke-width="1.5"/>
    <circle cx="0" cy="-38" r="3" fill="#00FFFF"/>
  </g>

  <!-- Small round bot - scattered -->
  <g opacity="0.48" transform="translate(380, 320) scale(0.4)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="-6" cy="-4" r="3" fill="#FF00FF"/>
    <circle cx="6" cy="-4" r="3" fill="#FF00FF"/>
    <line x1="0" y1="-22" x2="0" y2="-32" stroke="#FF00FF" stroke-width="1.5"/>
    <circle cx="0" cy="-32" r="2.5" fill="#FF00FF"/>
  </g>

  <!-- Tiny round bot -->
  <g opacity="0.42" transform="translate(1350, 200) scale(0.3)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="-5" cy="-4" r="2.5" fill="#FF00FF"/>
    <circle cx="5" cy="-4" r="2.5" fill="#FF00FF"/>
    <line x1="0" y1="-20" x2="0" y2="-28" stroke="#FF00FF" stroke-width="1"/>
  </g>

  <!-- ROBOT TYPE 2: Square/Box bot -->

