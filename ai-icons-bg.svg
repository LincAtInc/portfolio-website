    <circle cx="-5" cy="-2" r="2.5" fill="#FF00FF"/>
    <circle cx="5" cy="-2" r="2.5" fill="#FF00FF"/>
  </g>

  <!-- Code text elements -->
  <g opacity="0.35">
    <text x="100" y="320" font-family="'Courier New', monospace" font-size="16" fill="#FF00FF" filter="url(#softGlow)">&lt;/&gt;</text>
    <text x="1820" y="400" font-family="'Courier New', monospace" font-size="16" fill="#00FFFF" filter="url(#softGlow)">{ }</text>
    <text x="60" y="750" font-family="'Courier New', monospace" font-size="14" fill="#00FFFF">AI</text>
    <text x="1870" y="800" font-family="'Courier New', monospace" font-size="14" fill="#FF00FF">( )</text>
    <text x="380" y="990" font-family="'Courier New', monospace" font-size="14" fill="#FF00FF">=&gt;</text>
    <text x="1580" y="970" font-family="'Courier New', monospace" font-size="14" fill="#00FFFF">[]</text>
  </g>

  <!-- Floating particles -->
  <g opacity="0.38">
    <circle cx="480" cy="200" r="2.5" fill="#FF00FF" filter="url(#softGlow)"/>
    <circle cx="720" cy="140" r="2" fill="#00FFFF"/>
    <circle cx="1300" cy="180" r="2.5" fill="#FF00FF" filter="url(#softGlow)"/>
    <circle cx="1580" cy="220" r="2" fill="#00FFFF"/>
    <circle cx="160" cy="480" r="2.5" fill="#00FFFF"/>
    <circle cx="1800" cy="620" r="2.5" fill="#FF00FF"/>
    <circle cx="110" cy="880" r="2" fill="#FF00FF"/>
    <circle cx="750" cy="940" r="2.5" fill="#00FFFF"/>
    <circle cx="1200" cy="900" r="2" fill="#FF00FF"/>
    <circle cx="1880" cy="920" r="2.5" fill="#00FFFF"/>
    <circle cx="580" cy="420" r="2" fill="#FF00FF"/>
    <circle cx="1380" cy="480" r="2" fill="#00FFFF"/>
