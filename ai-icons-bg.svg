    <circle cx="0" cy="0" r="20" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <circle cx="-5" cy="-4" r="2.5" fill="#FF00FF"/>
    <circle cx="5" cy="-4" r="2.5" fill="#FF00FF"/>
    <line x1="0" y1="-20" x2="0" y2="-28" stroke="#FF00FF" stroke-width="1"/>
  </g>

  <g opacity="0.4" transform="translate(1420, 620) scale(0.3)">
    <rect x="-16" y="-14" width="32" height="28" rx="2" fill="none" stroke="#00FFFF" stroke-width="2"/>
    <circle cx="-5" cy="-2" r="2.5" fill="#00FFFF"/>
    <circle cx="5" cy="-2" r="2.5" fill="#00FFFF"/>
    <line x1="0" y1="-14" x2="0" y2="-20" stroke="#00FFFF" stroke-width="1"/>
