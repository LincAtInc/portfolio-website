<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
	 width="800px" height="800px" viewBox="0 0 32 32">
<style type="text/css">
	.cover_top{fill:#3b82f6;}
	.cover_left{fill:#2563eb;}
	.cover_bottom{fill:#1d4ed8;}
	.pages_right{fill:#f8fafc;}
	.pages_bottom{fill:#e2e8f0;}
	.spine{fill:#1e40af;}
</style>
<g>
	<!-- Book is a flat isometric box, slightly taller than wide -->

	<!-- Cover top surface -->
	<polygon class="cover_top" points="16,8 6,13 16,18 26,13"/>

	<!-- Spine (left face - thinner) -->
	<polygon class="spine" points="6,13 6,15 16,20 16,18"/>

	<!-- Pages visible from right side -->
	<polygon class="pages_right" points="26,13 26,23 16,28 16,18"/>

	<!-- Page edge lines on right face -->
	<line x1="25" y1="14" x2="17" y2="19" stroke="#cbd5e1" stroke-width="0.3"/>
	<line x1="25" y1="16" x2="17" y2="21" stroke="#cbd5e1" stroke-width="0.3"/>
	<line x1="25" y1="18" x2="17" y2="23" stroke="#cbd5e1" stroke-width="0.3"/>
	<line x1="25" y1="20" x2="17" y2="25" stroke="#cbd5e1" stroke-width="0.3"/>

	<!-- Bottom cover visible -->
	<polygon class="cover_bottom" points="6,15 6,25 16,30 16,20"/>

	<!-- Pages bottom edge -->
	<polygon class="pages_bottom" points="16,28 16,30 26,25 26,23"/>
</g>
</svg>
